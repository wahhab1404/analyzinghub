# Fly.io deployment configuration for Realtime Pricing Service

app = "indices-hub-realtime"
primary_region = "iad"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Environment variables to set via `fly secrets set`:
# POLYGON_API_KEY
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# REDIS_URL
# JWT_SECRET
