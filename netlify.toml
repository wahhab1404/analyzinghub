[build]
command = "npm run build"
publish = ".next"

[build.environment]
SECRETS_SCAN_OMIT_PATHS = "**/*.md,scripts/**/*,.env.example"

[[plugins]]
package = "@netlify/plugin-nextjs"

# Cache control headers
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# IMPORTANT: Configure these environment variables in Netlify Dashboard
# Go to: Site settings > Environment variables > Add a variable
#
# Required variables:
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - POLYGON_API_KEY
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_WEBHOOK_SECRET
# - APP_BASE_URL
# - SMTP_HOST
# - SMTP_PORT
# - SMTP_USER
# - SMTP_PASSWORD
# - SMTP_FROM_EMAIL
# - SMTP_FROM_NAME
